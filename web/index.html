<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="hud" class="hidden">
    <div class="top">
      <div class="brand">
        <img id="logo" class="logo" src="logo.png" alt="" />
        <div class="title">DRONE LINK</div>
      </div>
      <div class="modes">
        <div class="pill" id="modeSpot">SPOT</div>
        <div class="pill" id="modeTherm">THERM</div>
        <div class="pill" id="modeTrack">TRACK</div>
      </div>
    </div>

    <div class="bars">
      <div class="bar">
        <div class="label">BATTERY</div>
        <div class="meter"><div id="batFill" class="fill"></div></div>
        <div id="batVal" class="val">100%</div>
      </div>

      <div class="bar">
        <div class="label">SIGNAL</div>
        <div class="meter"><div id="sigFill" class="fill"></div></div>
        <div id="sigVal" class="val">100%</div>
      </div>
    </div>

    <div id="hints" class="hints">
      <div>WASD move • Space/Ctrl up/down • Mouse look • Drone follows camera</div>
      <div>Wheel zoom • F spotlight • T thermal • G ping • H tracker • Backspace exit</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
