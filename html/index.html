<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="hudRoot" class="hidden">
    <div class="scanlines"></div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div id="compass" class="compass">
      <div class="compass-track" id="compassTrack"></div>
      <div class="compass-pointer"></div>
    </div>

    <div id="reticle" class="reticle">
      <div class="reticle-bracket tl"></div>
      <div class="reticle-bracket tr"></div>
      <div class="reticle-bracket bl"></div>
      <div class="reticle-bracket br"></div>
      <div class="reticle-dot"></div>
    </div>

    <div id="radar" class="radar">
      <div class="radar-rings"></div>
      <div class="radar-sweep"></div>
      <div class="radar-heading-wedge"></div>
      <div id="radarBlips" class="radar-blips"></div>
    </div>

    <div id="hud">
      <div id="jamOverlay" class="jam-overlay"></div>

      <div class="top">
        <div class="brand">
          <img id="logo" class="logo" src="logo.png" alt="" />
          <div class="title">DRONE LINK</div>
        </div>
        <div class="modes">
          <div class="pill" id="modeSpot">SPOT</div>
          <div class="pill" id="modeTherm">THERM</div>
          <div class="pill" id="modeTrack">TRACK</div>
          <div class="pill jammed" id="modeJam">JAMMED</div>
        </div>
      </div>

      <div class="bars">
        <div class="bar" id="healthBar">
          <div class="label">HEALTH</div>
          <div class="meter"><div id="hpFill" class="fill hp"></div></div>
          <div id="hpVal" class="val">100%</div>
        </div>

        <div class="bar">
          <div class="label">BATTERY</div>
          <div class="meter"><div id="batFill" class="fill"></div></div>
          <div id="batVal" class="val">100%</div>
        </div>

        <div class="bar">
          <div class="label">SIGNAL</div>
          <div class="meter"><div id="sigFill" class="fill"></div></div>
          <div id="sigVal" class="val">100%</div>
        </div>
      </div>

      <div id="dartToast" class="dart-toast">DART FIRED</div>

      <div id="hints" class="hints">
        <div>WASD move • Space/Ctrl up/down • Mouse look • Drone follows camera</div>
        <div>Wheel zoom • F spotlight • T thermal • G ping • H tracker • Backspace exit</div>
      </div>
    </div>
  </div>

  <div id="hitFlash" class="hit-flash"></div>

  <div id="destroyedOverlay" class="destroyed-overlay">
    <div class="destroyed-card">
      <div class="destroyed-title">DRONE DESTROYED</div>
      <div class="destroyed-sub">SIGNAL LOST</div>
    </div>
  </div>

  <div id="bootOverlay" class="boot-overlay">
    <div class="boot-frame">
      <div class="boot-title">D R O N E &nbsp; L I N K</div>
      <div class="boot-sub" id="bootSub">ESTABLISHING UPLINK</div>
      <div class="boot-bar"><div class="boot-bar-fill" id="bootFill"></div></div>
      <div class="boot-lines" id="bootLines"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
